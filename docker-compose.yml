services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales_dev_pw
      POSTGRES_DB: sales_system
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://sales:sales_dev_pw@postgres:5432/sales_system
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-me
      DEBUG: "True"
      CASDOOR_ENDPOINT: ${CASDOOR_ENDPOINT:-https://casdoor.ashyglacier-8207efd2.eastasia.azurecontainerapps.io}
      CASDOOR_CLIENT_ID: ${CASDOOR_CLIENT_ID:-}
      CASDOOR_CLIENT_SECRET: ${CASDOOR_CLIENT_SECRET:-}
      CASDOOR_ORG: ${CASDOOR_ORG:-built-in}
      CASDOOR_APP_NAME: ${CASDOOR_APP_NAME:-xiaoshou}
      CASDOOR_REDIRECT_URI: ${CASDOOR_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
    ports: ["8000:8000"]

volumes:
  pgdata:
