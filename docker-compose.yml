    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
        VITE_CASDOOR_ENDPOINT: ${VITE_CASDOOR_ENDPOINT:-https://casdoor.ashyglacier-8207efd2.eastasia.azurecontainerapps.io}
        VITE_CASDOOR_CLIENT_ID: ${VITE_CASDOOR_CLIENT_ID:-d886e62a3d88caa515c1}
        VITE_CASDOOR_ORG: ${VITE_CASDOOR_ORG:-built-in}
        VITE_CASDOOR_APP: ${VITE_CASDOOR_APP:-sales}
        VITE_CASDOOR_REDIRECT: ${VITE_CASDOOR_REDIRECT:-http://localhost:5173/auth/callback}
