name: CI (docker)

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -t xs-api:ci .

      - name: Lint (ruff in container)
        run: |
          docker run --rm xs-api:ci sh -c "pip install --quiet ruff && ruff check . || true"
          # 不阻塞 CI; 后续严格化时去掉 || true

      - name: Setup network + sidecars (postgres 18 + redis 7)
        run: |
          docker network create xs-ci || true
          docker run -d --name xs-pg --network xs-ci \
            -e POSTGRES_USER=sales -e POSTGRES_PASSWORD=sales_dev_pw -e POSTGRES_DB=sales_system \
            postgres:18-alpine
          docker run -d --name xs-rd --network xs-ci redis:7-alpine
          for i in $(seq 1 30); do
            docker exec xs-pg pg_isready -U sales >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Test (pytest in api container)
        run: |
          docker run --rm --network xs-ci \
            -e DATABASE_URL=postgresql://sales:sales_dev_pw@xs-pg:5432/sales_system \
            -e REDIS_URL=redis://xs-rd:6379/0 \
            -e PG_HOST=xs-pg -e PG_USER=sales -e PG_PASSWORD=sales_dev_pw -e PG_DB=sales_system \
            -e REDIS_HOST=xs-rd -e REDIS_DB=0 \
            -e AUTH_ENABLED=false \
            -e SECRET_KEY=ci-secret \
            -e DEBUG=false \
            xs-api:ci sh -c "pip install --quiet pytest pytest-asyncio && alembic upgrade head && pytest -q"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f xs-pg xs-rd >/dev/null 2>&1 || true
          docker network rm xs-ci >/dev/null 2>&1 || true

  frontend:
    name: Frontend (docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t xs-web:ci ./frontend
