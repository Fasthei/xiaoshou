name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-container-app
  cancel-in-progress: false

env:
  RESOURCE_GROUP: sales-rg
  CONTAINER_APP:  xiaoshou-api
  ACR_NAME:       xiaoshouacrebncjhxbwh4c2
  IMAGE_NAME:     xiaoshou
  IMAGE_TAG:      ${{ github.sha }}

permissions:
  id-token: write   # OIDC 登录 Azure
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & push image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG \
                       -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      - name: Update Container App
        run: |
          az containerapp update \
            -g $RESOURCE_GROUP \
            -n $CONTAINER_APP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      - name: Wait for new revision to be ready
        run: |
          for i in {1..30}; do
            state=$(az containerapp revision list -g $RESOURCE_GROUP -n $CONTAINER_APP \
              --query "[?properties.active].properties.runningState" -o tsv | head -1)
            echo "revision state: $state"
            [[ "$state" == "Running" ]] && break
            sleep 10
          done

      - name: Show FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show -g $RESOURCE_GROUP -n $CONTAINER_APP \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "URL: https://$FQDN"

      - name: Post-deploy smoke test
        run: BASE_URL=https://${{ steps.fqdn.outputs.fqdn }} bash scripts/smoke-test.sh
